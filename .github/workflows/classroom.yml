name: Autograding Tests
'on':
  push:
  repository_dispatch:
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: event Test
      id: event-test
      uses: classroom-resources/autograding-command-grader@v1.0.0
      with:
        test-name: event Test
        setup-command: ''
        command: bash ./test/run.sh
        timeout: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1.0.0
      env:
        EVENT-TEST_RESULTS: "${{steps.event-test.outputs.result}}"
      with:
        runners: event-test
